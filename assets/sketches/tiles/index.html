<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <meta charset="utf-8" />
    <title>Wave Function Collapse</title>
    
    <style>
      /* Forza la pagina a occupare il 100% dello schermo senza margini */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #ffffff; /* Colore di sfondo della pagina */
        
        /* Flexbox: allinea al centro perfetto sia in orizzontale che in verticale */
        display: flex !important;
        justify-content: center !important;
        align-items: center !important;
        
        overflow: hidden; /* Evita la comparsa di barre di scorrimento */
      }

      /* Assicura che il canvas generato da p5.js rispetti la centratura */
      canvas {
        display: block;
      }
    </style>
  </head>

  <body>
    <script src="tile.js"></script>
    <script src="cell.js"></script>
    <script src="sketch.js"></script>
  </body>
</html>
